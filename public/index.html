if(window.Chart && window.ChartAnnotation){
  Chart.register(window.ChartAnnotation);

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0a0f14;--surface:rgba(18,26,34,0.85);--border:rgba(255,255,255,0.09);--text:#e8eff6;--muted:#7a8fa0;--accent:#e8873a;--green:#4caf7d;--blue:#6ab0d4;--red:#e05a4e;--rock:#8fa3b0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:url('/civetta.jpg');background-size:cover;background-position:center 30%;background-attachment:fixed;filter:brightness(0.18) saturate(0.5) sepia(0.3);z-index:0;}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(to bottom,rgba(10,15,20,0.55) 0%,rgba(10,15,20,0.2) 40%,rgba(10,15,20,0.6) 100%);z-index:0;}
header,main{position:relative;z-index:1;}
header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:rgba(8,13,18,0.92);backdrop-filter:blur(12px);z-index:100;}
.logo{font-weight:900;font-size:20px;letter-spacing:-0.5px;color:var(--accent);}
.logo span{color:var(--text);}
.logo-sub{font-size:10px;color:var(--rock);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.refresh-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s;display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{opacity:0.85;}.refresh-btn:disabled{opacity:0.4;cursor:not-allowed;}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.toggle{width:32px;height:18px;background:rgba(255,255,255,0.12);border-radius:9px;position:relative;cursor:pointer;border:none;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;}
.toggle.on::after{left:17px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pdot 2s infinite;}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.4}}
main{padding:20px;max-width:1000px;margin:0 auto;}
.cards-grid{display:grid;gap:16px;}

/* CARD */
.athlete-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,0.4);transition:border-color 0.3s;}
.athlete-card.finished{border-color:rgba(76,175,125,0.5);}
.athlete-card.dnf{border-color:rgba(224,90,78,0.4);opacity:0.7;}
.card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.card-bib{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:22px;min-width:50px;}
.card-name{font-weight:700;font-size:15px;flex:1;}
.card-club{font-size:11px;color:var(--muted);margin-top:2px;}
.race-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.card-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;white-space:nowrap;}
.status-running{background:rgba(232,135,58,0.18);color:var(--accent);}
.status-done{background:rgba(76,175,125,0.18);color:var(--green);}
.status-dnf{background:rgba(224,90,78,0.18);color:var(--red);}
.status-wait{background:rgba(122,143,160,0.18);color:var(--muted);}

/* GPS row */
.card-gps-row{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.gps-dot.active{background:var(--green);box-shadow:0 0 5px var(--green);animation:pdot 2s infinite;}
.gps-text{flex:1;color:var(--muted);}
.gps-text strong{color:var(--text);}
.gps-coords{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rock);}
.btn-sm{font-size:11px;font-weight:600;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(106,176,212,0.3);border-radius:4px;background:rgba(106,176,212,0.08);white-space:nowrap;cursor:pointer;}
.btn-sm:hover{background:rgba(106,176,212,0.18);}

/* MAP TOGGLE */
.card-map-toggle-btn{
  width:100%; padding:9px 16px;
  background:transparent; border:none; border-bottom:1px solid var(--border);
  color:var(--muted); font-size:12px; font-family:'Inter',sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:background 0.15s; text-align:left;
}
.card-map-toggle-btn:hover{background:rgba(255,255,255,0.04); color:var(--text);}
.card-map-toggle-btn .toggle-arrow{margin-left:auto; font-size:10px; transition:transform 0.2s;}
.card-map-toggle-btn.open .toggle-arrow{transform:rotate(180deg);}
.card-map-collapsible{display:none; border-bottom:1px solid var(--border);}
.card-map-collapsible.open{display:block;}
.card-map{height:280px; width:100%; background:#0d1a24;}

/* ELEVATION */
.card-elevation{padding:14px 16px;}
.elevation-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.elevation-chart-wrap{height:200px;position:relative;}

/* PROGRESS */
.card-progress{padding:12px 16px;border-top:1px solid var(--border);}
.progress-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-label strong{color:var(--text);font-weight:600;}
.progress-bar-wrap{background:rgba(255,255,255,0.08);border-radius:4px;height:5px;overflow:hidden;}
.progress-bar{height:5px;border-radius:4px;background:var(--accent);transition:width 0.6s ease;}
.progress-bar.done{background:var(--green);}

/* SPLITS */
.card-splits{padding:12px 16px 14px;}
.splits-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.splits-timeline{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px;}
.split-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:64px;position:relative;}
.split-item:not(:last-child)::after{content:'';position:absolute;top:10px;left:50%;width:100%;height:2px;background:rgba(255,255,255,0.08);z-index:0;}
.split-item.done:not(:last-child)::after{background:var(--accent);opacity:0.6;}
.split-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(10,15,20,0.6);z-index:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-bottom:6px;}
.split-dot.done{border-color:var(--accent);background:var(--accent);color:#fff;}
.split-dot.finish.done{border-color:var(--green);background:var(--green);}
.split-dot.current{border-color:var(--accent);background:rgba(10,15,20,0.8);color:var(--accent);animation:pdot 1.5s infinite;}
.split-label{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;}
.split-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--accent);text-align:center;margin-top:2px;}
.split-item.done .split-label{color:var(--text);}
.card-stats{padding:0 16px 14px;display:flex;gap:20px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;}
.stat-value.hi{color:var(--accent);}
.last-update{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-bottom:40px;font-family:'JetBrains Mono',monospace;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TIMER */
.card-timer{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02);}
.timer-icon{font-size:14px;}
.timer-text{flex:1;font-size:12px;color:var(--muted);}
.timer-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);}
.timer-value.running{color:var(--accent);}
.timer-value.finished{color:var(--green);}

.spinning{display:inline-block;animation:spin 0.8s linear infinite;}

/* Leaflet dark overrides */
.leaflet-container{background:#0d1a24;}
.leaflet-popup-content-wrapper{background:rgba(18,26,34,0.95);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:8px;}
.leaflet-popup-tip{background:rgba(18,26,34,0.95);}
.leaflet-popup-content{margin:10px 14px;font-family:'Inter',sans-serif;font-size:13px;}
.popup-bib{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;}
.popup-row{font-size:12px;color:var(--muted);margin-top:3px;}
.popup-row strong{color:var(--text);}
</style>

<body>
<header>
  <div>
    <div class="logo">DXT<span> '26</span></div>
    <div class="logo-sub">Val di Zoldo · Dolomiti</div>
  </div>
  <div class="header-actions">
    <div class="toggle-wrap">
      <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
      <span id="autoLabel">Auto</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <span id="refreshIcon">↻</span> Aggiorna
    </button>
  </div>
</header>
<main>
  <div class="cards-grid" id="cardsContainer">
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">⛰️</div>
      <div style="font-size:17px;color:var(--text);font-weight:600;margin-bottom:8px">DXT 2026 · Tracker</div>
      <div style="color:var(--rock)">Premi Aggiorna per caricare posizioni e dati live</div>
    </div>
  </div>
  <div class="last-update" id="lastUpdate"></div>
</main>
<script>

// Orari partenza ufficiali (UTC+2 = ora italiana)
const RACE_START = {
  "1": new Date("2026-06-12T22:00:00+02:00"), // 103K venerdi 22:00
  "2": new Date("2026-06-13T00:00:00+02:00"), // 72K  sabato 00:00
  "3": new Date("2026-06-13T05:30:00+02:00"), // 55K  sabato 05:30
};

function formatTimer(contest, finishTime, isDNF){
  const start = RACE_START[contest];
  const now = new Date();
  if(isDNF) return {value:"Ritirato", cls:"", icon:"❌"};
  if(finishTime && finishTime !== "n.a." && !finishTime.startsWith("C(")){
    // Già arrivato - mostra il tempo finale
    return {value: finishTime, cls:"finished", icon:"🏁"};
  }
  if(now < start){
    const diff = start - now;
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
    return {value: `Partenza tra ${h}h ${String(m).padStart(2,"0")}m`, cls:"", icon:"⏳"};
  }
  // In gara
  const elapsed = now - start;
  const h = Math.floor(elapsed/3600000);
  const m = Math.floor((elapsed%3600000)/60000);
  const s = Math.floor((elapsed%60000)/1000);
  return {value: `${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`, cls:"running", icon:"⏱️"};
}

const RACE_TOTALS = { "1": 407, "2": 393, "3": 650 };

const ATHLETES = [
  { name:"Paolo Alessandrini", bib:"185",  contest:"1", raceLabel:"103K", color:"#e8873a", geoEvent:"5423", gpxFile:"103k",
    splits:["Partenza","Passo Duran","Passo Staulanza","Zoppè","Passo Cibiana","Arrivo"],
    splitKm:[0,11,38,62,84,103], totalKm:103 },
  { name:"Mauro Mazzonetto",   bib:"1103", contest:"2", raceLabel:"72K",  color:"#6ab0d4", geoEvent:"5424", gpxFile:"72k",
    splits:["Partenza","Fusine","Zoppè","Passo Cibiana","Arrivo"],
    splitKm:[0,22,50,62,72], totalKm:72 },
  { name:"Alessio Pellizzon",  bib:"1147", contest:"2", raceLabel:"72K",  color:"#6ab0d4", geoEvent:"5424", gpxFile:"72k",
    splits:["Partenza","Fusine","Zoppè","Passo Cibiana","Arrivo"],
    splitKm:[0,22,50,62,72], totalKm:72 },
  { name:"Seraina Rizzardini", bib:"2356", contest:"3", raceLabel:"55K",  color:"#4caf7d", geoEvent:"5425", gpxFile:"55k",
    splits:["Partenza","Passo Duran","Passo Staulanza","Arrivo"],
    splitKm:[0,11,28,55], totalKm:55 },
  { name:"Sergio Marcellin",   bib:"2357", contest:"3", raceLabel:"55K",  color:"#4caf7d", geoEvent:"5425", gpxFile:"55k",
    splits:["Partenza","Passo Duran","Passo Staulanza","Arrivo"],
    splitKm:[0,11,28,55], totalKm:55 },
];

const INTER_LISTS = {
  "1":[{list:"RESULT PRESENTER|Inter1_all_new",label:"Passo Duran"},{list:"RESULT PRESENTER|Inter3_all_new",label:"Passo Staulanza"},{list:"RESULT PRESENTER|Inter4_all_new",label:"Zoppè"},{list:"RESULT PRESENTER|Inter5_all_new",label:"Passo Cibiana"}],
  "2":[{list:"RESULT PRESENTER|Inter2_all_new",label:"Fusine"},{list:"RESULT PRESENTER|Inter4_all_new",label:"Zoppè"},{list:"RESULT PRESENTER|Inter5_all_new",label:"Passo Cibiana"}],
  "3":[{list:"RESULT PRESENTER|Inter1_all_new",label:"Passo Duran"},{list:"RESULT PRESENTER|Inter3_all_new",label:"Passo Staulanza"}],
};

// Cache
let gpsCache = {}, gpxCache = {}, mapObjects = {}, chartObjects = {};
let autoRefresh = false, autoTimer = null;
let startTimes = {};  // bib -> timestamp partenza stimata

async function fetchProxy(listname, contest, bib){
  const r = await fetch(`/api/raceresult?listname=${encodeURIComponent(listname)}&contest=${contest}&bib=${encodeURIComponent(bib)}`);
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

async function fetchGPS(eventId){
  const r = await fetch(`/api/raceresult?action=gps&eventId=${eventId}`);
  if(!r.ok) return {};
  const data = await r.json();
  const byBib = {};
  for(const p of (data.data||[])) byBib[String(p.la)] = p;
  gpsCache[eventId] = byBib;
  return byBib;
}

async function fetchGPX(raceName){
  if(gpxCache[raceName]) return gpxCache[raceName];
  const r = await fetch(`/gpx-${raceName}.json`);
  if(!r.ok) return null;
  const pts = await r.json();  // [[lat,lng,ele,distM], ...]
  gpxCache[raceName] = pts;
  return pts;
}

function findBib(data, bib){
  if(!data) return null;
  for(const gk of Object.keys(data)){
    const g = data[gk];
    if(typeof g === "object" && !Array.isArray(g)){
      for(const sk of Object.keys(g)){
        const rows = g[sk];
        if(Array.isArray(rows)) for(const row of rows)
          if(Array.isArray(row) && String(row[0]).trim() === String(bib).trim()) return row;
      }
    } else if(Array.isArray(g)){
      for(const row of g) if(Array.isArray(row) && String(row[0]).trim() === String(bib).trim()) return row;
    }
  }
  return null;
}

// Trova punto GPX più vicino a lat/lng dati
function nearestGPXPoint(gpx, lat, lng){
  let best = 0, bestDist = Infinity;
  for(let i=0; i<gpx.length; i++){
    const dlat = gpx[i][0]-lat, dlng = gpx[i][1]-lng;
    const d = dlat*dlat + dlng*dlng;
    if(d < bestDist){ bestDist=d; best=i; }
  }
  return best;
}

// Calcola posizione stimata GPS per un atleta rispetto agli altri della stessa gara
// Restituisce {pos, total} dove total = iscritti totali alla gara
function calcGPSRank(athlete, gpsByEvent, gpxByName){
  const allGPS = gpsByEvent[athlete.geoEvent];
  const gpx = gpxByName[athlete.gpxFile];
  if(!allGPS || !gpx) return null;

  // Km del nostro atleta
  const myGPS = allGPS[athlete.bib];
  if(!myGPS) return null;
  const myIdx = nearestGPXPoint(gpx, parseFloat(myGPS.lt), parseFloat(myGPS.lg));
  const myKm = gpx[myIdx][3];

  // Filtra coordinate UK (sede GeoTracks = no fix GPS) - lat > 49 = UK
  const validUK = p => parseFloat(p.lt) > 49;

  // Calcola km di tutti gli atleti della stessa gara con GPS valido
  let ahead = 0;
  for(const bib of Object.keys(allGPS)){
    const p = allGPS[bib];
    if(validUK(p)) continue; // no fix GPS
    const idx = nearestGPXPoint(gpx, parseFloat(p.lt), parseFloat(p.lg));
    const km = gpx[idx][3];
    if(km > myKm) ahead++;
  }

  const pos = ahead + 1;
  const total = RACE_TOTALS[athlete.contest];
  return { pos, total };
}

async function loadAthlete(athlete){
  const [mainRes, ...splitRes] = await Promise.allSettled([
    fetchProxy("Result Lists|CLASSIFICA GENERALE ASSOLUTA", athlete.contest, athlete.bib),
    ...INTER_LISTS[athlete.contest].map(il => fetchProxy(il.list, "0", athlete.bib))
  ]);
  let mainRow = null;
  if(mainRes.status === "fulfilled") mainRow = findBib(mainRes.value?.data, athlete.bib);
  const splits = {};
  INTER_LISTS[athlete.contest].forEach((il,i) => {
    if(splitRes[i].status === "fulfilled"){
      const row = findBib(splitRes[i].value?.data, athlete.bib);
      if(row) splits[il.label] = row;
    }
  });
  return { mainRow, splits };
}

async function refreshAll(){
  const btn = document.getElementById("refreshBtn");
  const icon = document.getElementById("refreshIcon");
  const dot = document.getElementById("statusDot");
  btn.disabled=true; icon.className="spinning"; dot.className="status-dot live";
  gpsCache = {};

  const container = document.getElementById("cardsContainer");
  const empty = container.querySelector("div[style*='padding:80px']");
  if(empty) empty.remove();

  const uniqueEvents = [...new Set(ATHLETES.map(a=>a.geoEvent))];
  const uniqueGpx    = [...new Set(ATHLETES.map(a=>a.gpxFile))];

  const [athleteResults, gpsResults, gpxResults] = await Promise.all([
    Promise.all(ATHLETES.map(a => loadAthlete(a))),
    Promise.all(uniqueEvents.map(id => fetchGPS(id))),
    Promise.all(uniqueGpx.map(n => fetchGPX(n))),
  ]);

  const gpsByEvent = {};
  uniqueEvents.forEach((id,i) => gpsByEvent[id] = gpsResults[i]);
  const gpxByName = {};
  uniqueGpx.forEach((n,i) => gpxByName[n] = gpxResults[i]);

  athleteResults.forEach((res, i) => {
    const a = ATHLETES[i];
    const gpsData = gpsByEvent[a.geoEvent]?.[a.bib] || null;
    const gpxData = gpxByName[a.gpxFile] || null;
    const gpsRank = calcGPSRank(a, gpsByEvent, gpxByName);
    renderCard(a, res.mainRow, res.splits, gpsData, gpxData, gpsRank);
  });

  const now = new Date().toLocaleTimeString("it-IT");
  document.getElementById("lastUpdate").textContent = "⟳ Aggiornato alle "+now;
  btn.disabled=false; icon.className=""; icon.textContent="↻";
  setTimeout(()=>dot.className="status-dot",3000);
}

function formatElapsed(start){
  const s = Math.floor((Date.now()-start)/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return `${h}h ${String(m).padStart(2,"0")}m`;
}

function renderCard(athlete, row, splits, gps, gpx, gpsRank){
  const container = document.getElementById("cardsContainer");
  const cardId = "card-"+athlete.bib;
  let card = document.getElementById(cardId);
  const isNew = !card;
  if(isNew){ card=document.createElement("div"); card.id=cardId; card.className="athlete-card"; container.appendChild(card); }

  const finishTime = row?.[6]?.trim();
  const hasFinished = finishTime && finishTime!=="" && finishTime!=="n.a." && !finishTime.startsWith("C(");
  const isDNF = row?.[2] && String(row[2]).includes("DNF");
  const rank = row?.[2]||null;
  const name = row?.[3]||athlete.name;
  const club = (row?.[5]||"").trim();

  card.className = "athlete-card"+(hasFinished?" finished":isDNF?" dnf":"");

  // Km da GPS se disponibile
  let kmGPS = null, gpsIdx = null;
  if(gps && gpx){
    const idx = nearestGPXPoint(gpx, parseFloat(gps.lt), parseFloat(gps.lg));
    gpsIdx = idx;
    kmGPS = gpx[idx][3]/1000;
  }

  // Km da checkpoint
  let lastCpIdx = 0;
  athlete.splits.forEach((sp,i)=>{ if(splits[sp]) lastCpIdx=i; });
  if(hasFinished) lastCpIdx = athlete.splits.length-1;
  const kmCheckpoint = athlete.splitKm[lastCpIdx]||0;

  // Usa GPS se disponibile e > checkpoint
  const kmDone = (kmGPS !== null && kmGPS > kmCheckpoint) ? kmGPS : kmCheckpoint;
  const pct = Math.min(100, Math.round((kmDone/athlete.totalKm)*100));

  const statusHtml = hasFinished?`<span class="card-status status-done">✓ Arrivato</span>`:
    isDNF?`<span class="card-status status-dnf">Ritirato</span>`:
    (gps||Object.keys(splits).length>0)?`<span class="card-status status-running">In gara</span>`:
    `<span class="card-status status-wait">In attesa</span>`;

  // GPS row
  let gpsRowHtml = "";
  if(gps){
    const lat=parseFloat(gps.lt).toFixed(5), lng=parseFloat(gps.lg).toFixed(5);
    const isMoving = gps.s===1;
    const mapsUrl = `https://www.google.com/maps?q=${gps.lt},${gps.lg}`;
    const ele = gpx && gpsIdx!==null ? Math.round(gpx[gpsIdx][2])+"m" : "—";
    gpsRowHtml = `<div class="card-gps-row">
      <div class="gps-dot${isMoving?" active":""}"></div>
      <div class="gps-text">
        <strong>GPS live</strong> · ${isMoving?"in movimento":"fermo"} · <span class="gps-coords">${lat}, ${lng}</span> · alt. ${ele}
      </div>
      <a class="btn-sm" href="${mapsUrl}" target="_blank">📍 Maps</a>
    </div>`;
  } else {
    gpsRowHtml = `<div class="card-gps-row"><div class="gps-dot"></div><div class="gps-text" style="color:var(--muted)">Tracker GPS non ancora attivo</div></div>`;
  }

  // Splits timeline
  let splitsHtml = '<div class="splits-timeline">';
  athlete.splits.forEach((sp,i)=>{
    const isDone = i===0||!!splits[sp]||(sp==="Arrivo"&&hasFinished)||i<=lastCpIdx;
    const isLast = i===athlete.splits.length-1;
    const isCurrent = !isDone&&i>0&&(i-1)<=lastCpIdx;
    let timeHtml="";
    if(sp!=="Partenza"&&splits[sp]){const t=Array.isArray(splits[sp])?splits[sp][6]:"";if(t&&t!=="n.a.") timeHtml=`<div class="split-time">${t}</div>`;}
    if(sp==="Arrivo"&&hasFinished) timeHtml=`<div class="split-time">${finishTime}</div>`;
    const dotCls=(isLast&&isDone)?"split-dot finish done":isDone?"split-dot done":isCurrent?"split-dot current":"split-dot";
    const itemCls=isDone?"split-item done":"split-item";
    const icon=isDone?"✓":isCurrent?"●":"";
    splitsHtml+=`<div class="${itemCls}"><div class="${dotCls}">${icon}</div><div class="split-label">${sp.replace("Passo ","")}</div>${timeHtml}</div>`;
  });
  splitsHtml+="</div>";

  // Timer
  const timer = formatTimer(athlete.contest, finishTime, isDNF);
  const timerHtml = `<div class="card-timer">
    <span class="timer-icon">${timer.icon}</span>
    <span class="timer-text">Tempo in gara</span>
    <span class="timer-value ${timer.cls}">${timer.value}</span>
  </div>`;

  const total = RACE_TOTALS[athlete.contest] || "?";
  const rankNum = rank && rank !== "n.a." && !String(rank).includes("DNF") ? rank : null;

  // Posizione ibrida: GPS live corretto dal rank ufficiale ai checkpoint
  let posHtml = "";
  if(!isDNF && !hasFinished){
    const gpsPosNum  = gpsRank ? gpsRank.pos : null;
    const rankOffNum = rankNum ? parseInt(rankNum) : null;

    // Prendi il peggiore (più alto numericamente) tra GPS e ufficiale
    // perché chi non ha GPS non viene contato dalla stima
    let displayPos = null, isOfficial = false, isHybrid = false;

    if(gpsPosNum !== null && rankOffNum !== null){
      if(rankOffNum > gpsPosNum){
        // Checkpoint dice che ci sono più persone davanti → usa ufficiale
        displayPos = rankOffNum;
        isOfficial = true;
      } else {
        // GPS è più pesante o uguale → stima GPS partendo dalla base checkpoint
        displayPos = gpsPosNum;
        isHybrid = true;
      }
    } else if(gpsPosNum !== null){
      displayPos = gpsPosNum;
    } else if(rankOffNum !== null){
      displayPos = rankOffNum;
      isOfficial = true;
    }

    if(displayPos !== null){
      const tilde  = (!isOfficial) ? "~" : "";
      const label  = isOfficial  ? "Posizione ufficiale"
                   : isHybrid    ? "Posizione live (GPS+checkpoint)"
                   :               "Posizione stimata GPS";
      posHtml = `<div class="stat">
        <div class="stat-label">${label}</div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span style="font-size:22px;font-weight:900;color:${athlete.color}">${tilde}#${displayPos}</span>
          <span style="font-size:12px;color:var(--muted)">/ ${total}</span>
        </div>
      </div>`;
    }
  } else if(hasFinished && rankNum){
    posHtml = `<div class="stat">
      <div class="stat-label">Posizione finale</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span style="font-size:22px;font-weight:900;color:${athlete.color}">#${rankNum}</span>
        <span style="font-size:12px;color:var(--muted)">/ ${total}</span>
      </div>
    </div>`;
  }

  const statsHtml = `<div class="card-stats">
    ${posHtml}
    ${hasFinished?`<div class="stat"><div class="stat-label">Tempo finale</div><div class="stat-value hi">${finishTime}</div></div>`:""}
    ${row&&row[7]&&row[7]!=="n.a."&&row[7].trim()?`<div class="stat"><div class="stat-label">Gap dal 1°</div><div class="stat-value">${row[7]}</div></div>`:""}
    ${kmGPS!==null?`<div class="stat"><div class="stat-label">Km GPS</div><div class="stat-value">${kmGPS.toFixed(1)} km</div></div>`:""}
  </div>`;

  const mapId = "map-"+athlete.bib;
  const chartId = "chart-"+athlete.bib;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-bib" style="color:${athlete.color}">${athlete.bib}</div>
      <div style="flex:1"><div class="card-name">${esc(name)}</div>${club?`<div class="card-club">${esc(club)}</div>`:""}</div>
      <span class="race-badge" style="background:${athlete.color}22;color:${athlete.color}">${athlete.raceLabel}</span>
      ${statusHtml}
    </div>
    ${gpsRowHtml}
    ${timerHtml}
    <button class="card-map-toggle-btn" id="toggle-${athlete.bib}" onclick="toggleMap('${athlete.bib}')">
      🗺️ Mappa + profilo altimetrico
      <span class="toggle-arrow">▼</span>
    </button>
    <div class="card-map-collapsible" id="mapcoll-${athlete.bib}">
      <div id="${mapId}" class="card-map"></div>
      <div class="card-elevation">
        <div class="elevation-label">Profilo altimetrico · quota lungo il percorso</div>
        <div class="elevation-chart-wrap"><canvas id="${chartId}"></canvas></div>
      </div>
    </div>
    <div class="card-progress">
      <div class="progress-label"><span>Avanzamento</span><strong>${kmDone.toFixed(1)} / ${athlete.totalKm} km · ${pct}%</strong></div>
      <div class="progress-bar-wrap"><div class="progress-bar${hasFinished?" done":""}" style="width:${pct}%"></div></div>
    </div>
    <div class="card-splits"><div class="splits-label">Checkpoint</div>${splitsHtml}</div>
    ${statsHtml}`;

  // Mappa e chart inizializzati lazy al primo click sul toggle
}

function initMap(mapId, athlete, gpx, gps, gpsIdx){
  // Rimuovi mappa precedente se esiste
  if(mapObjects[mapId]){ mapObjects[mapId].remove(); delete mapObjects[mapId]; }

  const mapEl = document.getElementById(mapId);
  if(!mapEl) return;

  // Centro: usa posizione GPS se disponibile, altrimenti centro del percorso
  let center, zoom;
  if(gps){ center=[parseFloat(gps.lt), parseFloat(gps.lg)]; zoom=14; }
  else if(gpx){ const mid=Math.floor(gpx.length/2); center=[gpx[mid][0],gpx[mid][1]]; zoom=12; }
  else{ center=[46.35,12.18]; zoom=12; }

  const map = L.map(mapId, { zoomControl:true, attributionControl:false }).setView(center, zoom);
  mapObjects[mapId] = map;

  // Tile layer topografico
  // Base layer sbiadito
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom:17, opacity:0.28
  }).addTo(map);
  // Overlay scuro per far risaltare il tracciato
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom:19, opacity:0.55
  }).addTo(map);

  // Tracciato GPX
  if(gpx){
    const latlngs = gpx.map(p=>[p[0],p[1]]);
    L.polyline(latlngs, {color:athlete.color, weight:4.5, opacity:1.0}).addTo(map);
    // Glow effect: linea più larga sotto
    L.polyline(latlngs, {color:athlete.color, weight:10, opacity:0.18}).addTo(map);

    // Markers checkpoint (inizio/fine)
    const startPt = gpx[0], endPt = gpx[gpx.length-1];
    L.circleMarker([startPt[0],startPt[1]],{radius:6,color:'#4caf7d',fillColor:'#4caf7d',fillOpacity:1,weight:2}).addTo(map).bindPopup("🏁 Partenza / Forno di Zoldo");
    L.circleMarker([endPt[0],endPt[1]],{radius:6,color:'#4caf7d',fillColor:'#fff',fillOpacity:1,weight:2}).addTo(map).bindPopup("🏁 Arrivo / Forno di Zoldo");
  }

  // Puntino atleta
  if(gps){
    const lat=parseFloat(gps.lt), lng=parseFloat(gps.lg);
    const isMoving = gps.s===1;
    const ele = (gpx&&gpsIdx!==null) ? Math.round(gpx[gpsIdx][2])+"m slm" : "";
    const kmStr = (gpx&&gpsIdx!==null) ? (gpx[gpsIdx][3]/1000).toFixed(1)+" km" : "";

    const icon = L.divIcon({
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${athlete.color};border:3px solid #fff;box-shadow:0 0 8px ${athlete.color};${isMoving?'animation:pdot 1s infinite':''}"></div>`,
      iconSize:[16,16], iconAnchor:[8,8], className:''
    });

    const popup = `<div class="popup-bib" style="color:${athlete.color}">#${athlete.bib}</div>
      <div class="popup-row"><strong>${athlete.name.split(' ')[0]}</strong> · ${athlete.raceLabel}</div>
      ${kmStr?`<div class="popup-row">📍 <strong>${kmStr}</strong> percorsi</div>`:''}
      ${ele?`<div class="popup-row">⛰️ Quota <strong>${ele}</strong></div>`:''}
      <div class="popup-row">${isMoving?"🟢 In movimento":"⚪ Fermo"}</div>`;

    L.marker([lat,lng],{icon}).addTo(map).bindPopup(popup);
  }
}

function initChart(chartId, athlete, gpx, gpsIdx){
  if(chartObjects[chartId]){ chartObjects[chartId].destroy(); delete chartObjects[chartId]; }
  const canvas = document.getElementById(chartId);
  if(!canvas || !gpx) return;

  // Campiona il percorso: 200 punti uniformi
  const step = Math.max(1, Math.floor(gpx.length/200));
  const sampledPts = [];
  for(let i=0;i<gpx.length;i+=step) sampledPts.push(gpx[i]);
  if(sampledPts[sampledPts.length-1] !== gpx[gpx.length-1]) sampledPts.push(gpx[gpx.length-1]);

  // Dataset unico: {x: km, y: quota}
  const profileData = sampledPts.map(p => ({ x: p[3]/1000, y: p[2] }));

  // Posizione atleta: km e quota esatti
  const posKm  = gpsIdx !== null ? gpx[gpsIdx][3]/1000 : null;
  const posEle = gpsIdx !== null ? gpx[gpsIdx][2]      : null;

  const chart = new Chart(canvas, {
    type:'line',
    data:{
      datasets:[
        {
          // Profilo altimetrico
          data: profileData,
          borderColor: athlete.color,
          borderWidth: 2,
          fill: true,
          backgroundColor: `${athlete.color}22`,
          pointRadius: 0,
          tension: 0.3,
          order: 2,
        },
        ...(posKm !== null ? [{
          // Puntino posizione atleta — scatter sovrapposto
          type: 'scatter',
          data: [{ x: posKm, y: posEle }],
          pointRadius: 8,
          pointHoverRadius: 10,
          pointBackgroundColor: athlete.color,
          pointBorderColor: '#ffffff',
          pointBorderWidth: 2.5,
          showLine: false,
          order: 1,
        }] : []),
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          filter: ctx => ctx.datasetIndex === 0,
          callbacks:{
            title: ctx => `km ${ctx[0].parsed.x.toFixed(1)}`,
            label: ctx => `${Math.round(ctx.parsed.y)}m slm`
          }
        },
        annotation:{},
      },
      scales:{
        x:{
          type:'linear',
          ticks:{color:'#7a8fa0',font:{size:9},maxTicksLimit:8,callback:v=>v+'km'},
          grid:{color:'rgba(255,255,255,0.05)'},
          title:{display:true,text:'km',color:'#7a8fa0',font:{size:9}},
          min:0,
        },
        y:{
          ticks:{color:'#7a8fa0',font:{size:9},maxTicksLimit:6,callback:v=>v+'m'},
          grid:{color:'rgba(255,255,255,0.07)'},
          title:{display:true,text:'quota (m slm)',color:'#7a8fa0',font:{size:9}},
          suggestedMin: Math.min(...eles)-50,
          suggestedMax: Math.max(...eles)+50,
        }
      }
    }
  });
  chartObjects[chartId] = chart;
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
// Tick ogni secondo per aggiornare i timer
function tickTimers(){
  document.querySelectorAll('.card-timer').forEach(el => {
    const card = el.closest('.athlete-card');
    if(!card) return;
    const bib = card.id.replace('card-','');
    const athlete = ATHLETES.find(a => a.bib === bib);
    if(!athlete) return;
    const finishEl = card.querySelector('.status-done');
    const dnfEl = card.querySelector('.status-dnf');
    const finishTime = finishEl ? null : null; // già gestito
    const isDNF = !!dnfEl;
    const hasFinished = !!finishEl;
    // Ricostruisci solo il valore del timer
    const timerVal = el.querySelector('.timer-value');
    if(!timerVal) return;
    const start = RACE_START[athlete.contest];
    const now = new Date();
    if(isDNF){ timerVal.textContent='Ritirato'; timerVal.className='timer-value'; return; }
    if(hasFinished){ return; } // non toccare, mostra tempo finale
    if(now < start){
      const diff = start-now;
      const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
      timerVal.textContent=`Partenza tra ${h}h ${String(m).padStart(2,'0')}m`;
      timerVal.className='timer-value';
    } else {
      const elapsed=now-start;
      const h=Math.floor(elapsed/3600000), m=Math.floor((elapsed%3600000)/60000), s=Math.floor((elapsed%60000)/1000);
      timerVal.textContent=`${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
      timerVal.className='timer-value running';
    }
  });
}
setInterval(tickTimers, 1000);

function toggleMap(bib){
  const btn = document.getElementById('toggle-'+bib);
  const coll = document.getElementById('mapcoll-'+bib);
  if(!btn || !coll) return;
  const isOpen = coll.classList.contains('open');
  if(isOpen){
    coll.classList.remove('open');
    btn.classList.remove('open');
  } else {
    coll.classList.add('open');
    btn.classList.add('open');
    // Inizializza mappa solo al primo apertura (lazy)
    const mapEl = document.getElementById('map-'+bib);
    if(mapEl && !mapEl._leaflet_id){
      const athlete = ATHLETES.find(a=>a.bib===bib);
      if(athlete){
        const gpx = gpxCache[athlete.gpxFile]||null;
        const gpsData = gpsCache[athlete.geoEvent]?.[bib]||null;
        const gpsIdx = (gpsData&&gpx) ? nearestGPXPoint(gpx,parseFloat(gpsData.lt),parseFloat(gpsData.lg)) : null;
        initMap('map-'+bib, athlete, gpx, gpsData, gpsIdx);
        initChart('chart-'+bib, athlete, gpx, gpsIdx);
      }
    }
    // Forza resize leaflet
    setTimeout(()=>{
      if(mapObjects['map-'+bib]) mapObjects['map-'+bib].invalidateSize();
    }, 50);
  }
}

function toggleAuto(){
  autoRefresh=!autoRefresh;
  document.getElementById("autoToggle").className="toggle"+(autoRefresh?" on":"");
  document.getElementById("autoLabel").textContent=autoRefresh?"Auto ✓":"Auto";
  if(autoTimer) clearInterval(autoTimer);
  if(autoRefresh) autoTimer=setInterval(refreshAll,30000);
}
</script>
